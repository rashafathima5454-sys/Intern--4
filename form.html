<div class="contact-section">

  <div class="container py-5">

    <div class="row g-5 align-items-center">

      <!-- Contact Details -->
      <div class="col-lg-5">

        <span class="contact-tag">CONTACT US</span>

        <h1 class="fw-bold mt-2">
          We're Here to Help
        </h1>

        <p class="contact-text mt-3">
          Have questions about our watches, orders, or warranty services?
          Our customer care team is ready to assist you.
        </p>

        <div class="contact-info mt-4">
          <p>📞 +91 98765 43210</p>
          <p>📧 support@watchstore.com</p>
          <p>📍 Kochi, Kerala</p>
          <p>🕒 Mon - Sat: 9:00 AM - 6:00 PM</p>
        </div>

      </div>

      <!-- Contact Form -->
      <div class="col-lg-7">

        <div class="contact-card">

          <h3 class="mb-4">Send a Message</h3>

          <form>

            <div class="mb-3">
              <input
                type="text"
                class="form-control"
                placeholder="Your Name">
            </div>

            <div class="mb-3">
              <input
                type="email"
                class="form-control"
                placeholder="Your Email">
            </div>

            <div class="mb-3">
              <textarea
                rows="5"
                class="form-control"
                placeholder="Your Message"></textarea>
            </div>

            <button type="submit" class="btn send-btn">
              Send Message
            </button>

          </form>

        </div>

      </div>

    </div>

  </div>

</div>
